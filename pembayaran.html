<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pembayaran Berhasil - Sehatin</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #f9f6f5;
            color: #2f2f2f;
        }

        .page {
            min-height: 720px;
            background: #f9f6f5;
            position: relative;
            overflow: hidden;
        }

        .topbar {
            height: 80px;
            padding: 0 80px;
            display: flex;
            align-items: center;
            background: rgba(249, 246, 245, 0.8);
            backdrop-filter: blur(12px);
            position: relative;
            z-index: 5;
        }

        .logo {
            width: 244px;
            color: #14532d;
            font-size: 24px;
            font-weight: 700;
            line-height: 32px;
            text-decoration: none;
        }

        .nav {
            flex: 1;
            display: flex;
            justify-content: center;
            gap: 32px;
        }

        .nav a {
            color: #5c5b5b;
            font-size: 14px;
            line-height: 20px;
            text-decoration: none;
            white-space: nowrap;
        }

        .header-actions {
            width: 244px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 31px;
        }

        .cart-link {
            width: 24px;
            height: 24px;
            color: #2f2f2f;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
        }

        .cart-link svg {
            width: 20px;
            height: 20px;
        }

        .profile-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #006b1b;
            color: #d1ffc8;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 700;
            line-height: 20px;
            text-decoration: none;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
        }

        .main {
            min-height: 640px;
            padding-top: 48px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            z-index: 1;
        }

        .glow {
            position: absolute;
            border-radius: 999px;
            pointer-events: none;
            z-index: 0;
            filter: blur(64px);
        }

        .glow-left {
            width: 192px;
            height: 192px;
            top: 80px;
            left: 336px;
            background: rgba(171, 244, 172, 0.2);
        }

        .glow-right {
            width: 256px;
            height: 256px;
            top: 290px;
            left: 672px;
            background: rgba(145, 247, 142, 0.2);
        }

        .success-card {
            width: 512px;
            min-height: 387px;
            border-radius: 24px;
            background: #ffffff;
            box-shadow: 0 12px 40px rgba(47, 47, 47, 0.06);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 32px 24px 31px;
            position: relative;
            z-index: 2;
        }

        .success-icon {
            width: 128px;
            height: 128px;
            border-radius: 50%;
            background: linear-gradient(135deg, #006b1b 0%, #91f78e 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
        }

        .success-icon-inner {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #43ad56;
        }

        .success-icon-inner svg {
            width: 28px;
            height: 28px;
        }

        .success-title {
            max-width: 320px;
            color: #006b1b;
            font-size: 48px;
            font-weight: 700;
            line-height: 48px;
            letter-spacing: 0;
            margin-bottom: 16px;
        }

        .success-message {
            max-width: 475px;
            color: #5c5b5b;
            font-size: 18px;
            line-height: 29.25px;
        }

        .actions {
            margin-top: 48px;
            display: flex;
            justify-content: center;
            gap: 16px;
            position: relative;
            z-index: 2;
        }

        .action-btn {
            width: 216px;
            height: 56px;
            border-radius: 999px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            font-size: 16px;
            font-weight: 600;
            line-height: 24px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .action-btn:hover {
            transform: translateY(-1px);
        }

        .action-primary {
            background: #006b1b;
            color: #d1ffc8;
        }

        .action-primary:hover {
            box-shadow: 0 10px 22px rgba(0, 107, 27, 0.18);
        }

        .action-secondary {
            background: #e4e2e2;
            color: #2f2f2f;
        }

        .receipt-note {
            margin-top: 47px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            color: #5c5b5b;
            font-size: 14px;
            line-height: 20px;
            position: relative;
            z-index: 2;
        }

        .receipt-note svg {
            width: 16px;
            height: 16px;
            color: #006b1b;
            flex-shrink: 0;
        }

        @media (max-width: 768px) {
            .page {
                min-height: 100vh;
            }

            .topbar {
                height: auto;
                padding: 18px 24px;
                flex-wrap: wrap;
                gap: 16px;
            }

            .logo,
            .header-actions {
                width: auto;
            }

            .nav {
                order: 3;
                width: 100%;
                justify-content: flex-start;
                overflow-x: auto;
                gap: 24px;
                padding-bottom: 2px;
            }

            .header-actions {
                margin-left: auto;
            }

            .main {
                padding: 36px 24px 48px;
                min-height: auto;
            }

            .success-card {
                width: min(100%, 512px);
                min-height: auto;
            }

            .success-title {
                font-size: 38px;
                line-height: 40px;
            }

            .success-message {
                font-size: 16px;
                line-height: 26px;
            }

            .actions {
                width: min(100%, 512px);
                flex-direction: column;
                margin-top: 32px;
            }

            .action-btn {
                width: 100%;
            }

            .receipt-note {
                width: min(100%, 512px);
                align-items: flex-start;
                margin-top: 32px;
            }
        }
    </style>
</head>
<body>
    <div class="page">
        <header class="topbar">
            <a class="logo" href="index.html">Sehatin</a>

            <nav class="nav" aria-label="Navigasi utama">
                <a href="index.html">Beranda</a>
                <a href="paketcatering.html">Paket</a>
                <a href="monitoring.html">Pantau Nutrisi</a>
                <a href="riwayat.html">Pesanan</a>
            </nav>

            <div class="header-actions">
                <a class="cart-link" href="keranjang.html" aria-label="Keranjang">
                    <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                        <path d="M3.75 4.75h2.1l1.65 9.05a2 2 0 0 0 1.97 1.64h6.92a2 2 0 0 0 1.92-1.43l1.37-4.64H7.07M9.25 19.25h.01M17.25 19.25h.01" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </a>
                <a class="profile-avatar" href="profil.html" aria-label="Profil JD">JD</a>
            </div>
        </header>

        <main class="main">
            <div class="glow glow-left"></div>
            <div class="glow glow-right"></div>

            <section class="success-card" aria-labelledby="payment-success-title">
                <div class="success-icon" aria-hidden="true">
                    <div class="success-icon-inner">
                        <svg viewBox="0 0 32 32" fill="none">
                            <path d="M8 16.8 13.2 22 24.5 10.5" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </div>
                </div>

                <h1 class="success-title" id="payment-success-title">Pembayaran Berhasil!</h1>
                <p class="success-message">Pesanan Anda telah kami terima dan tim kami.<br>kali segera menyiapkan menu sehat terbaik untuk Anda.</p>
            </section>

            <div class="actions">
                <a class="action-btn action-primary" href="riwayat.html">Lihat Riwayat Pesanan</a>
                <a class="action-btn action-secondary" href="index.html">Kembali ke Beranda</a>
            </div>

            <div class="receipt-note">
                <svg viewBox="0 0 16 16" fill="none" aria-hidden="true">
                    <path d="M8 14.5A6.5 6.5 0 1 0 8 1.5a6.5 6.5 0 0 0 0 13ZM8 7.25v4M8 4.75h.01" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
                </svg>
                <span>E-receipt telah dikirimkan ke email terdaftar Anda.</span>
            </div>
        </main>
    </div>
</body>
</html>
